name = "metamark"
compatibility_date = "2025-08-31"
main = "src/worker.ts"
workers_dev = false
preview_urls = true

[assets]
directory = "dist"
binding = "ASSETS"
html_handling = "force-trailing-slash"

[[routes]]
pattern = "metamark.kiakiraki.dev"
custom_domain = true

[env.preview]
name = "metamark-preview"
workers_dev = true
