version: 2

registries: {}

updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 15
    groups:
      # Next.js / React — version coupling が強いのでまとめる
      next-react:
        patterns:
          - 'next'
          - '@next/*'
          - 'react'
          - 'react-dom'
          - 'eslint-config-next'
        update-types:
          - 'minor'
          - 'patch'
      # Linting & Formatting
      linting:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'eslint-config-prettier'
          - 'prettier'
        update-types:
          - 'minor'
          - 'patch'
      # TypeScript & type definitions
      types:
        patterns:
          - 'typescript'
          - '@types/*'
        update-types:
          - 'minor'
          - 'patch'
      # Styling — Tailwind CSS ecosystem
      styling:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
        update-types:
          - 'minor'
          - 'patch'
      # UI component libraries
      ui-components:
        patterns:
          - '@radix-ui/*'
          - 'framer-motion'
        update-types:
          - 'minor'
          - 'patch'
      # Testing infrastructure
      testing:
        patterns:
          - 'vitest'
          - '@testing-library/*'
          - 'jsdom'
        update-types:
          - 'minor'
          - 'patch'
      # Application utilities
      utilities:
        patterns:
          - 'clsx'
          - 'exifr'
          - 'react-dropzone'
          - 'zustand'
        update-types:
          - 'minor'
          - 'patch'
      # Build tooling
      build-tools:
        patterns:
          - 'baseline-browser-mapping'
        update-types:
          - 'minor'
          - 'patch'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore(dev)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'ci'
      - 'github-actions'
      - 'automated'
